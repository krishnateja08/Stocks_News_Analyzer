name: Deploy StockPulse to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy to GitHub Pages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Enable GitHub Pages
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/pages \
            -d '{"build_type":"workflow"}' || true

      # Generate config.js with the real API key — loaded by index.html at runtime
      - name: Generate config.js from Secret
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          mkdir -p _site
          cp index.html _site/index.html
          # Write config.js with real key into _site
          echo "window.GEMINI_API_KEY = '${GEMINI_API_KEY}';" > _site/config.js
          echo "config.js generated successfully"
          # Confirm it has content
          cat _site/config.js | head -c 40
          echo "..."

      - name: Verify config.js
        run: |
          if [ ! -f "_site/config.js" ]; then
            echo "ERROR: config.js not found!"
            exit 1
          fi
          if grep -q "undefined\|''" _site/config.js; then
            echo "ERROR: API key appears empty in config.js"
            exit 1
          fi
          echo "SUCCESS: config.js looks good"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Site Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
