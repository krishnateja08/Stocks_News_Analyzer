name: Deploy StockPulse Python to GitHub Pages

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 4 * * 1-5'   # Auto-run Mon-Fri at 9:30 AM IST (4:00 UTC)
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  analyze-and-deploy:
    name: Fetch News → Analyze → Deploy Report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          # No cache here — avoids error if requirements.txt is missing

      - name: Install Dependencies
        run: |
          pip install feedparser==6.0.11 requests==2.31.0
          echo "✅ Dependencies installed"

      - name: Run Stock Analyzer
        run: |
          python stocksanalyzer.py --market both --no-open --output index.html
          echo "✅ Analysis complete"

      - name: Verify Output
        run: |
          if [ ! -f "index.html" ]; then
            echo "❌ index.html was not generated"
            exit 1
          fi
          echo "✅ index.html ready ($(wc -c < index.html) bytes)"

      - name: Prepare _site Folder
        run: |
          mkdir -p _site
          cp index.html _site/index.html

      - name: Enable GitHub Pages
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/pages \
            -d '{"build_type":"workflow"}' || true

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Site Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
