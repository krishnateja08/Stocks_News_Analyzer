name: Deploy StockPulse to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy to GitHub Pages
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repository code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Enable GitHub Pages automatically via API
      - name: Enable GitHub Pages
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/pages \
            -d '{"build_type":"workflow"}' || true
          echo "Pages enable request sent"

      # Step 3: Build site — copy to _site folder and inject API key
      # This ensures the SOURCE index.html always keeps the placeholder (safe for git)
      # Only the BUILT _site/index.html gets the real key injected
      - name: Build Site & Inject Gemini API Key
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          mkdir -p _site
          cp index.html _site/index.html
          sed -i "s|%%GEMINI_API_KEY%%|${GEMINI_API_KEY}|g" _site/index.html
          echo "API key injected into _site/index.html"

      # Step 4: Verify the built file has the real key
      - name: Verify API Key Injection
        run: |
          if grep -q "%%GEMINI_API_KEY%%" _site/index.html; then
            echo "ERROR: Placeholder still present — GEMINI_API_KEY secret not set correctly"
            echo "Go to: Settings > Secrets and variables > Actions > GEMINI_API_KEY"
            exit 1
          else
            echo "SUCCESS: API key injected correctly into built file"
          fi

      # Step 5: Setup GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v4

      # Step 6: Upload ONLY _site (the built folder with real key injected)
      - name: Upload Site Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      # Step 7: Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
